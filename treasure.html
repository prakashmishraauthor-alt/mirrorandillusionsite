<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Museum Interior - Wizard Entrance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
    }
    
    .scene {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: url('museum-bg1.png') no-repeat center center;
      background-size: cover;
      animation: subtleZoom 20s ease-in-out infinite alternate;
    }
    
    @keyframes subtleZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.03); }
    }
    
    /* LIGHT FLARES */
    .flare {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.6) 0%, transparent 70%);
      pointer-events: none;
      animation: flarePulse 4s ease-in-out infinite;
    }
    
    .flare1 {
      width: 200px;
      height: 200px;
      top: 15%;
      left: 50%;
      animation-delay: 0s;
    }
    
    .flare2 {
      width: 150px;
      height: 150px;
      top: 60%;
      left: 20%;
      animation-delay: 1.5s;
      background: radial-gradient(circle, rgba(100, 150, 255, 0.5) 0%, transparent 70%);
    }
    
    .flare3 {
      width: 180px;
      height: 180px;
      top: 60%;
      right: 20%;
      animation-delay: 3s;
      background: radial-gradient(circle, rgba(180, 100, 255, 0.5) 0%, transparent 70%);
    }
    
    @keyframes flarePulse {
      0%, 100% { 
        opacity: 0.3;
        transform: scale(0.8);
      }
      50% { 
        opacity: 0.7;
        transform: scale(1.2);
      }
    }
    
    /* FLOATING PARTICLES */
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #FFD700;
      border-radius: 50%;
      box-shadow: 0 0 10px #FFD700, 0 0 20px rgba(255, 215, 0, 0.5);
      animation: float 12s infinite linear;
      opacity: 0;
    }
    
    @keyframes float {
      0% { 
        transform: translateY(110vh) translateX(0) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% { 
        transform: translateY(-10vh) translateX(100px) scale(1.5);
        opacity: 0;
      }
    }
    
    /* WIZARD */
    .wizard {
      position: absolute;
      bottom: 8%;
      left: -150px;
      width: 130px;
      height: 170px;
      z-index: 20;
      animation: walkAcross 8s ease-out 1s forwards;
    }
    
    .wizard-body {
      position: relative;
      width: 100%;
      height: 100%;
      animation: bob 0.6s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
    }
    
    .wizard-hat {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 38px solid transparent;
      border-right: 38px solid transparent;
      border-bottom: 65px solid #2d1b4e;
    }
    
    .wizard-hat::after {
      content: '';
      position: absolute;
      top: 60px;
      left: -43px;
      width: 86px;
      height: 10px;
      background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
      border-radius: 5px;
      box-shadow: 0 0 20px #FFD700;
    }
    
    .wizard-head {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      background: #f5d6b4;
      border-radius: 50%;
    }
    
    .wizard-beard {
      position: absolute;
      top: 92px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 48px;
      background: #e8e8e8;
      border-radius: 0 0 30px 30px;
    }
    
    .wizard-robe {
      position: absolute;
      top: 98px;
      left: 50%;
      transform: translateX(-50%);
      width: 85px;
      height: 72px;
      background: linear-gradient(180deg, #4a2c6d 0%, #2d1b4e 100%);
      border-radius: 42px 42px 0 0;
    }
    
    .wizard-staff {
      position: absolute;
      top: 75px;
      right: 5px;
      width: 5px;
      height: 95px;
      background: linear-gradient(180deg, #8b4513 0%, #5c3317 100%);
      transform: rotate(12deg);
    }
    
    .wizard-staff::after {
      content: '';
      position: absolute;
      top: -12px;
      left: -8px;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #FFD700 0%, #FFA500 100%);
      border-radius: 50%;
      box-shadow: 0 0 30px #FFD700, 0 0 50px #FFA500, 0 0 80px rgba(255, 215, 0, 0.5);
      animation: glow 1s ease-in-out infinite alternate;
    }
    
    .leg {
      position: absolute;
      bottom: 0;
      width: 19px;
      height: 38px;
      background: #2d1b4e;
      border-radius: 0 0 7px 7px;
    }
    
    .leg-left {
      left: 32px;
      animation: walkLeft 0.6s ease-in-out infinite;
    }
    
    .leg-right {
      right: 32px;
      animation: walkRight 0.6s ease-in-out infinite;
    }
    
    @keyframes walkAcross {
      0% { left: -150px; }
      100% { left: 50%; transform: translateX(-50%); }
    }
    
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes walkLeft {
      0%, 100% { transform: rotate(-20deg) translateX(0px); }
      50% { transform: rotate(20deg) translateX(7px); }
    }
    
    @keyframes walkRight {
      0%, 100% { transform: rotate(20deg) translateX(0px); }
      50% { transform: rotate(-20deg) translateX(-7px); }
    }
    
    @keyframes glow {
      0% { box-shadow: 0 0 30px #FFD700, 0 0 50px #FFA500; }
      100% { box-shadow: 0 0 50px #FFD700, 0 0 90px #FFA500, 0 0 130px rgba(255, 215, 0, 0.6); }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <!-- LIGHT FLARES -->
    <div class="flare flare1"></div>
    <div class="flare flare2"></div>
    <div class="flare flare3"></div>
    
    <!-- WIZARD -->
    <div class="wizard">
      <div class="wizard-body">
        <div class="wizard-hat"></div>
        <div class="wizard-head"></div>
        <div class="wizard-beard"></div>
        <div class="wizard-robe"></div>
        <div class="wizard-staff"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
      </div>
    </div>
  </div>

  <script>
    // Generate floating particles
    const scene = document.getElementById('scene');
    
    function createParticle() {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (8 + Math.random() * 8) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      scene.appendChild(particle);
      
      setTimeout(() => particle.remove(), 16000);
    }
    
    // Create particles continuously
    setInterval(createParticle, 300);
    
    // Initial burst
    for(let i = 0; i < 20; i++) {
      setTimeout(createParticle, i * 100);
    }
  </script>
</body>
</html>
