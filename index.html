<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Museum Hall - 3D Wizard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      overflow: hidden;
    }
    
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    
   .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('museum-bg1.png') no-repeat center center;
      background-size: cover;
      z-index: -1;
    }
    
   .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FFD700;
      font-family: Georgia, serif;
      font-size: 24px;
      z-index: 100;
      text-shadow: 0 0 20px #FFD700;
    }
  </style>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="bg"></div>
  <div class="loading" id="loading">Summoning Wizard...</div>
  <canvas id="canvas"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.5, 7);
    camera.lookAt(0, 1.5, 0);
    
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('canvas'),
      alpha: true,
      antialias: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    
    // LIGHTING
    const ambientLight = new THREE.AmbientLight(0x3a4a6a, 0.8);
    scene.add(ambientLight);
    
    const leftLight = new THREE.PointLight(0xFFD700, 1.5, 30);
    leftLight.position.set(-4, 3, 2);
    scene.add(leftLight);
    
    const rightLight = new THREE.PointLight(0xFFD700, 1.5, 30);
    rightLight.position.set(4, 3, 2);
    scene.add(rightLight);
    
    const topLight = new THREE.PointLight(0x6a8cff, 2, 40);
    topLight.position.set(0, 8, 0);
    scene.add(topLight);
    
    const wizardLight = new THREE.SpotLight(0xFFD700, 1.5, 15, Math.PI / 6, 0.5);
    wizardLight.position.set(0, 5, 3);
    wizardLight.target.position.set(0, 0, 0);
    wizardLight.castShadow = true;
    scene.add(wizardLight);
    scene.add(wizardLight.target);
    
    // GROUND FOR SHADOWS
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);
